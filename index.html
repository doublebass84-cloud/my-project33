<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>횡단보도 안내 시스템 v6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root {
            --safe:    #00e676;
            --danger:  #ff1744;
            --warn:    #ffab00;
            --bg:      #050a0e;
            --panel:   #0d1821;
            --border:  #1a2a3a;
            --text:    #e8f0f7;
            --muted:   #4a6070;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── 카메라 영역 ── */
        #camera-area {
            position: relative;
            flex: 1 1 60%;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        #camera-area canvas,
        #camera-area video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ROI 오버레이 */
        #roi-overlay {
            position: absolute;
            border: 2px dashed rgba(255, 213, 0, 0.8);
            background: rgba(255, 213, 0, 0.04);
            pointer-events: none;
            display: none;
            border-radius: 4px;
        }
        #roi-label {
            position: absolute;
            top: -22px;
            left: 0;
            font-size: 11px;
            color: #ffd500;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Roboflow 바운딩 박스 오버레이 */
        #rf-overlay {
            position: absolute;
            border: 3px solid var(--safe);
            pointer-events: none;
            display: none;
            border-radius: 4px;
            transition: all 0.3s;
        }
        #rf-label {
            position: absolute;
            top: -24px;
            left: 0;
            font-size: 12px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--safe);
        }
        #rf-overlay.red-signal { border-color: var(--danger); }
        #rf-overlay.red-signal #rf-label { color: var(--danger); }
        #rf-overlay.off-signal { border-color: var(--muted); }
        #rf-overlay.off-signal #rf-label { color: var(--muted); }

        /* 디버그 패널 */
        #debug-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(5, 10, 14, 0.85);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 2;
            display: none;
            color: #7ec8e3;
            backdrop-filter: blur(6px);
        }
        #debug-panel .dv { color: #e8f0f7; }

        /* 상태 뱃지 */
        #signal-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--border);
            letter-spacing: 0.05em;
            transition: all 0.3s;
        }

        /* 로딩 바 */
        #loading-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--safe), #00bcd4);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* 도구 버튼 */
        #toolbar {
            position: absolute;
            bottom: 12px;
            right: 10px;
            display: flex;
            gap: 6px;
        }
        .tool-btn {
            background: rgba(5, 10, 14, 0.8);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .tool-btn:hover { color: var(--text); border-color: var(--safe); }
        .tool-btn.active { color: var(--safe); border-color: var(--safe); }

        /* ── 정보 패널 ── */
        #info-area {
            flex: 0 0 auto;
            background: var(--panel);
            border-top: 4px solid var(--safe);
            padding: 18px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
            transition: border-color 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #info-area.danger  { border-top-color: var(--danger); }
        #info-area.warn    { border-top-color: var(--warn); }

        #main-msg {
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            font-weight: 900;
            line-height: 1.25;
            word-break: keep-all;
            letter-spacing: -0.02em;
        }
        #sub-msg {
            font-size: clamp(0.8rem, 3vw, 0.95rem);
            color: var(--muted);
            word-break: keep-all;
            line-height: 1.4;
            min-height: 1.2em;
        }

        /* 통계 행 */
        #stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 4px;
        }
        .stat-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 6px;
            text-align: center;
        }
        .stat-val {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.85rem, 3vw, 1.05rem);
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }
        .stat-lbl {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.03em;
        }
        .stat-card.highlight .stat-val { color: var(--safe); }
        .stat-card.warn-val .stat-val  { color: var(--warn); }
        .stat-card.danger-val .stat-val { color: var(--danger); }

        /* 탭 힌트 */
        #tap-hint {
            font-size: 10px;
            color: #2a3a4a;
            text-align: center;
            letter-spacing: 0.05em;
        }

        /* ── 오버레이 ── */
        #overlay {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #0d1821 0%, #050a0e 100%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 30px;
        }

        .logo { font-size: 3rem; margin-bottom: 4px; }
        #overlay h1 {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--safe);
            letter-spacing: -0.02em;
            text-align: center;
        }
        #overlay p {
            font-size: 0.88rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.7;
            max-width: 340px;
        }
        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn-start {
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            border: none;
            border-radius: 50px;
            background: var(--safe);
            color: #050a0e;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.3);
        }
        .btn-start:active { transform: scale(0.96); }
        .btn-secondary {
            padding: 18px 28px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
        }
        .btn-secondary:hover { border-color: var(--text); color: var(--text); }
        #video-input { display: none; }
        label[for="video-input"] {
            padding: 18px 28px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
        }
        label[for="video-input"]:hover { border-color: var(--text); color: var(--text); }
        .notice { font-size: 0.75rem; color: #2a3a4a; text-align: center; }

        /* 점멸 애니메이션 */
        @keyframes warn-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .blinking #main-msg { animation: warn-pulse 0.8s ease infinite; }
    </style>
</head>
<body>

<!-- 시작 오버레이 -->
<div id="overlay">
    <div class="logo">🚦</div>
    <h1>횡단보도 안내 시스템 v6</h1>
    <p>시각장애인을 위한 실시간 신호 안내<br>
       TM 장면분류 + Roboflow 신호등 검출<br>
       카메라를 신호등 방향으로 향한 후 시작하세요</p>
    <div class="btn-row">
        <button class="btn-start" onclick="startApp('camera')">📷 카메라 시작</button>
        <label for="video-input">🎬 영상 테스트</label>
        <input type="file" id="video-input" accept="video/*" onchange="startApp('video', this)">
    </div>
    <p class="notice">카메라 · 위치 권한이 필요합니다</p>
</div>

<!-- 카메라 영역 -->
<div id="camera-area">
    <div id="roi-overlay"><span id="roi-label">OCR 영역</span></div>
    <div id="rf-overlay"><span id="rf-label">-</span></div>
    <div id="debug-panel">
        <div>SCENE   <span class="dv" id="d-scene">-</span></div>
        <div>SIGNAL  <span class="dv" id="d-signal">-</span></div>
        <div>RF_CONF <span class="dv" id="d-rfconf">-</span></div>
        <div>OCR     <span class="dv" id="d-ocr">-</span></div>
        <div>BLINK   <span class="dv" id="d-blink">-</span></div>
        <div>WIDTH   <span class="dv" id="d-width">-</span></div>
        <div>SPEED   <span class="dv" id="d-speed">-</span></div>
        <div>CROSS_T <span class="dv" id="d-crosst">-</span></div>
    </div>
    <div id="signal-badge">STANDBY</div>
    <div id="toolbar">
        <button class="tool-btn" id="btn-debug" onclick="toggleDebug()">디버그</button>
        <button class="tool-btn" id="btn-roi" onclick="toggleROI()">OCR영역</button>
    </div>
    <div id="loading-bar"></div>
</div>

<!-- 정보 패널 -->
<div id="info-area" onclick="repeatSpeak()" aria-live="assertive" role="status">
    <div id="main-msg">시스템 대기 중</div>
    <div id="sub-msg">터치하면 음성 반복</div>
    <div id="stats-row">
        <div class="stat-card" id="sc-time">
            <span class="stat-val" id="s-time">--</span>
            <span class="stat-lbl">잔여시간</span>
        </div>
        <div class="stat-card" id="sc-cross">
            <span class="stat-val" id="s-cross">--</span>
            <span class="stat-lbl">예상횡단</span>
        </div>
        <div class="stat-card" id="sc-speed">
            <span class="stat-val" id="s-speed">--</span>
            <span class="stat-lbl">보행속도</span>
        </div>
        <div class="stat-card" id="sc-width">
            <span class="stat-val" id="s-width">--</span>
            <span class="stat-lbl">횡단거리</span>
        </div>
    </div>
    <div id="tap-hint">화면을 탭하면 음성 반복</div>
</div>

<script>
// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
const TM_MODEL_URL       = "https://teachablemachine.withgoogle.com/models/evw4CriFx/";
const RF_MODEL_ID        = "signal-detect-instant-1";
const RF_API_KEY         = "EUwdgTSdDsVFUzryHbkq";
const RF_API_URL         = `https://detect.roboflow.com/${RF_MODEL_ID}?api_key=${RF_API_KEY}&confidence=40&overlap=30`;

const TM_INTERVAL        = 300;    // TM 예측 주기 (ms)
const RF_INTERVAL        = 1500;   // Roboflow 호출 주기 (ms) — API 속도 고려
const OCR_INTERVAL       = 1200;   // OCR 실행 주기 (ms)

const CONFIDENCE_MIN     = 0.90;   // TM 최소 신뢰도
const RF_CONFIDENCE_MIN  = 0.40;   // Roboflow 최소 신뢰도
const SAFETY_BUFFER      = 3;      // 안전 여유 (초)
const DEFAULT_SPEED      = 1.2;    // 기본 보행속도 (m/s)
const STRIPE_M           = 1.0;    // 줄무늬 1쌍 = 1m
const SPEAK_DANGER_WAIT  = 3000;
const SPEAK_NORMAL_WAIT  = 5000;

// 점멸 감지: 최근 N개 Roboflow 결과에서 green↔off 반복 패턴
const BLINK_HISTORY_SIZE = 8;      // 최근 8회 Roboflow 결과 보관
const BLINK_TOGGLE_MIN   = 3;      // green↔off 전환 3회 이상 → 점멸

// TM 장면 확정: 최빈값 투표
const SCENE_VOTE_SIZE    = 6;

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let tmModel, webcam, maxPredictions;
let videoEl        = null;
let isVideoMode    = false;

// 장면 상태 (TM)
let sceneState       = "unknown";
let sceneVoteBuffer  = [];

// 신호 상태 (Roboflow)
let signalState      = "unknown";   // green / red / off / unknown
let signalConfidence = 0;
let rfBbox           = null;        // {x, y, width, height}

// 점멸 감지
let rfHistory        = [];          // 최근 Roboflow 결과 배열
let isBlinking       = false;

// OCR
let ocrTime          = null;
let ocrWorker        = null;
let isOcrRunning     = false;

// 횡단 거리 / 보행속도
let estimatedWidth   = null;
let walkSpeed        = DEFAULT_SPEED;
let speedHistory     = [];
let lastGpsCoords    = null;
let lastGpsMs        = null;

// UI
let lastMsg          = "";
let lastSpeakMs      = 0;
let lastTmTs         = 0;
let lastRfTs         = 0;
let lastOcrTs        = 0;
let isRfRunning      = false;

let debugOn          = false;
let roiOn            = false;
let roiRect          = null;

// 오프스크린 캔버스
const ocrCanvas = document.createElement('canvas');
const ocrCtx    = ocrCanvas.getContext('2d', { willReadFrequently: true });
const cwCanvas  = document.createElement('canvas');
const cwCtx     = cwCanvas.getContext('2d', { willReadFrequently: true });
const rfCanvas  = document.createElement('canvas');
const rfCtx     = rfCanvas.getContext('2d');

// ════════════════════════════════════════════════
//  ENTRY POINT
// ════════════════════════════════════════════════
async function startApp(mode, fileInput) {
    document.getElementById('overlay').style.display = 'none';
    setMsg("시스템 초기화 중...", "잠시만 기다려주세요");
    speak(" ");

    try {
        // 1. Tesseract
        bar(10);
        try {
            ocrWorker = await Tesseract.createWorker('eng', 1, { logger: () => {} });
            await ocrWorker.setParameters({ tessedit_char_whitelist: '0123456789' });
        } catch (e) {
            console.warn('OCR 비활성화:', e.message);
            ocrWorker = null;
            document.getElementById('s-time').textContent = 'N/A';
        }

        // 2. TM 모델
        bar(40);
        tmModel = await tmImage.load(TM_MODEL_URL + "model.json", TM_MODEL_URL + "metadata.json");
        maxPredictions = tmModel.getTotalClasses();

        // 3. Roboflow — API 방식이라 별도 로드 불필요
        bar(60);

        // 4. 입력 소스
        bar(70);
        if (mode === 'camera') {
            await initCamera();
        } else {
            await initVideo(fileInput.files[0]);
        }

        // 5. 센서
        bar(90);
        initSensors();

        bar(100);
        setTimeout(() => bar(0), 600);

        setMsg("분석 시작", "카메라를 신호등 방향으로 향하세요");
        speak("시스템이 활성화되었습니다.");

        requestAnimationFrame(mainLoop);
    } catch (e) {
        setMsg("초기화 오류", e.message);
        speak("오류가 발생했습니다.");
        console.error(e);
    }
}

async function initCamera() {
    const w = window.innerWidth;
    const h = Math.floor(window.innerHeight * 0.6);
    webcam = new tmImage.Webcam(w, h, false);
    await webcam.setup({ facingMode: "environment" });
    await webcam.play();
    document.getElementById("camera-area").appendChild(webcam.canvas);
    setDefaultROI(webcam.canvas.width, webcam.canvas.height);
}

async function initVideo(file) {
    isVideoMode = true;
    videoEl = document.createElement('video');
    videoEl.src = URL.createObjectURL(file);
    videoEl.loop = true;
    videoEl.muted = true;
    videoEl.playsInline = true;
    videoEl.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    document.getElementById("camera-area").appendChild(videoEl);
    await videoEl.play();
    videoEl.addEventListener('loadedmetadata', () => {
        setDefaultROI(videoEl.videoWidth, videoEl.videoHeight);
    });
}

// ════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════
async function mainLoop(ts) {
    const src = getSource();
    if (!src) { requestAnimationFrame(mainLoop); return; }

    if (!isVideoMode) webcam.update();

    // TM: 장면 분류 (crosswalk / surround / background)
    if (ts - lastTmTs > TM_INTERVAL) {
        await runTmPrediction(src);
        lastTmTs = ts;
    }

    // Roboflow: 신호등 검출 (green / red / off)
    if (ts - lastRfTs > RF_INTERVAL) {
        runRoboflow(src);   // async, non-blocking
        lastRfTs = ts;
    }

    // OCR: 잔여시간 인식
    if (ts - lastOcrTs > OCR_INTERVAL) {
        runOCR(src);
        lastOcrTs = ts;
    }

    // 횡단거리 추정
    estimateCrosswalkWidth(src);

    // 최종 판단
    buildDecision();

    requestAnimationFrame(mainLoop);
}

function getSource() {
    if (isVideoMode) {
        return (videoEl && !videoEl.paused && videoEl.readyState >= 2) ? videoEl : null;
    }
    return webcam ? webcam.canvas : null;
}

// ════════════════════════════════════════════════
//  TM PREDICTION — 장면 분류만 담당
// ════════════════════════════════════════════════
async function runTmPrediction(src) {
    if (!tmModel) return;
    const preds = await tmModel.predict(src);

    let top = { className: "unknown", probability: 0 };
    for (const p of preds) {
        if (p.probability > top.probability) top = p;
    }

    const detected = top.probability >= CONFIDENCE_MIN ? top.className : "low_confidence";

    // 장면 분류에서 신호등 클래스 → crosswalk로 매핑 (TM은 장면만 담당)
    let scene = detected;
    if (scene === "blinker greenlight" || scene === "blinker redlight") {
        scene = "crosswalk";  // 신호등 보이면 횡단보도 앞임
    }

    // 최빈값 투표
    sceneVoteBuffer.push(scene);
    if (sceneVoteBuffer.length > SCENE_VOTE_SIZE) sceneVoteBuffer.shift();
    sceneState = majorityVote(sceneVoteBuffer);

    if (debugOn) $('d-scene').textContent = sceneState + ' (' + (top.probability * 100).toFixed(0) + '%)';
}

function majorityVote(arr) {
    const counts = {};
    for (const v of arr) counts[v] = (counts[v] || 0) + 1;
    let maxVal = "", maxCount = 0;
    for (const [k, c] of Object.entries(counts)) {
        if (c > maxCount) { maxVal = k; maxCount = c; }
    }
    return maxVal;
}

// ════════════════════════════════════════════════
//  ROBOFLOW INFERENCE — 신호등 검출 (green/red/off)
// ════════════════════════════════════════════════
async function runRoboflow(src) {
    if (isRfRunning) return;
    isRfRunning = true;

    try {
        const sw = srcW(src), sh = srcH(src);

        // 캔버스에 프레임 복사 → base64 변환
        rfCanvas.width = 640;
        rfCanvas.height = Math.floor(640 * sh / sw);
        rfCtx.drawImage(src, 0, 0, sw, sh, 0, 0, rfCanvas.width, rfCanvas.height);

        const base64 = rfCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        const response = await fetch(RF_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: base64
        });

        const data = await response.json();

        if (data.predictions && data.predictions.length > 0) {
            // 가장 신뢰도 높은 예측 선택
            let best = data.predictions[0];
            for (const p of data.predictions) {
                if (p.confidence > best.confidence) best = p;
            }

            if (best.confidence >= RF_CONFIDENCE_MIN) {
                signalState = best.class;       // "green", "red", "off"
                signalConfidence = best.confidence;
                rfBbox = {
                    x: best.x, y: best.y,
                    width: best.width, height: best.height,
                    imgW: data.image?.width || rfCanvas.width,
                    imgH: data.image?.height || rfCanvas.height
                };
                updateRfOverlay();
            } else {
                signalState = "unknown";
                signalConfidence = 0;
                hideRfOverlay();
            }
        } else {
            signalState = "unknown";
            signalConfidence = 0;
            hideRfOverlay();
        }

        // 점멸 감지: 결과 히스토리 업데이트
        rfHistory.push(signalState);
        if (rfHistory.length > BLINK_HISTORY_SIZE) rfHistory.shift();
        detectBlink();

        // 상태 뱃지 업데이트
        const badge = document.getElementById('signal-badge');
        if (signalState === "green") {
            badge.textContent = 'GREEN ' + (signalConfidence * 100).toFixed(0) + '%';
            badge.style.color = 'var(--safe)';
        } else if (signalState === "red") {
            badge.textContent = 'RED ' + (signalConfidence * 100).toFixed(0) + '%';
            badge.style.color = 'var(--danger)';
        } else if (signalState === "off") {
            badge.textContent = 'OFF ' + (signalConfidence * 100).toFixed(0) + '%';
            badge.style.color = 'var(--muted)';
        } else {
            badge.textContent = sceneState.toUpperCase();
            badge.style.color = 'var(--text)';
        }

        if (debugOn) {
            $('d-signal').textContent = signalState + ' ' + (signalConfidence * 100).toFixed(0) + '%';
            $('d-rfconf').textContent = data.predictions?.length + '개 감지';
        }

    } catch (e) {
        console.warn('Roboflow error:', e);
        if (debugOn) $('d-signal').textContent = 'API 오류';
    } finally {
        isRfRunning = false;
    }
}

// ════════════════════════════════════════════════
//  ROBOFLOW OVERLAY — 바운딩 박스 표시
// ════════════════════════════════════════════════
function updateRfOverlay() {
    if (!rfBbox) return;
    const area = document.getElementById('camera-area');
    const dw = area.offsetWidth, dh = area.offsetHeight;

    // Roboflow 좌표 → 화면 좌표 변환
    const scaleX = dw / rfBbox.imgW;
    const scaleY = dh / rfBbox.imgH;

    const cx = rfBbox.x * scaleX;
    const cy = rfBbox.y * scaleY;
    const bw = rfBbox.width * scaleX;
    const bh = rfBbox.height * scaleY;

    const overlay = document.getElementById('rf-overlay');
    overlay.style.left   = (cx - bw/2) + 'px';
    overlay.style.top    = (cy - bh/2) + 'px';
    overlay.style.width  = bw + 'px';
    overlay.style.height = bh + 'px';
    overlay.style.display = 'block';

    overlay.classList.remove('red-signal', 'off-signal');
    if (signalState === 'red') overlay.classList.add('red-signal');
    else if (signalState === 'off') overlay.classList.add('off-signal');

    const label = document.getElementById('rf-label');
    label.textContent = signalState.toUpperCase() + ' ' + (signalConfidence * 100).toFixed(0) + '%';
}

function hideRfOverlay() {
    document.getElementById('rf-overlay').style.display = 'none';
}

// ════════════════════════════════════════════════
//  BLINK DETECTION — green↔off 패턴 분석
// ════════════════════════════════════════════════
function detectBlink() {
    if (rfHistory.length < 4) {
        isBlinking = false;
        if (debugOn) $('d-blink').textContent = '데이터 부족';
        return;
    }

    // green↔off 전환 횟수 카운트
    let toggleCount = 0;
    for (let i = 1; i < rfHistory.length; i++) {
        const prev = rfHistory[i - 1];
        const curr = rfHistory[i];
        if ((prev === 'green' && curr === 'off') || (prev === 'off' && curr === 'green')) {
            toggleCount++;
        }
    }

    // green과 off만 있고, 전환이 충분히 많으면 → 점멸
    const hasOnlyGreenOff = rfHistory.every(r => r === 'green' || r === 'off' || r === 'unknown');
    isBlinking = hasOnlyGreenOff && toggleCount >= BLINK_TOGGLE_MIN;

    if (debugOn) $('d-blink').textContent = isBlinking ? '⚡ 점멸! (전환 ' + toggleCount + '회)' : '안정 (전환 ' + toggleCount + '회)';
}

// ════════════════════════════════════════════════
//  OCR (Tesseract.js)
// ════════════════════════════════════════════════
async function runOCR(src) {
    if (!ocrWorker || isOcrRunning || !roiRect) return;
    isOcrRunning = true;

    try {
        const sw = srcW(src), sh = srcH(src);
        const rx = Math.floor(roiRect.x * sw);
        const ry = Math.floor(roiRect.y * sh);
        const rw = Math.floor(roiRect.w * sw);
        const rh = Math.floor(roiRect.h * sh);

        if (rw < 10 || rh < 10) return;

        ocrCanvas.width  = rw * 2;
        ocrCanvas.height = rh * 2;
        ocrCtx.imageSmoothingEnabled = false;
        ocrCtx.drawImage(src, rx, ry, rw, rh, 0, 0, rw * 2, rh * 2);

        const imgData = ocrCtx.getImageData(0, 0, rw * 2, rh * 2);
        binarize(imgData);
        ocrCtx.putImageData(imgData, 0, 0);

        const { data: { text } } = await ocrWorker.recognize(ocrCanvas);
        const nums = text.match(/\d+/g);

        if (nums?.length > 0) {
            const v = parseInt(nums[0]);
            if (v >= 1 && v <= 99) ocrTime = v;
        }

        if (debugOn) {
            $('d-ocr').textContent = ocrTime !== null ? ocrTime + '초' : '미감지 (' + text.trim() + ')';
        }
    } catch (e) {
        console.warn('OCR error:', e);
    } finally {
        isOcrRunning = false;
    }
}

function binarize(imgData) {
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
        const bin  = gray > 128 ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = bin;
    }
}

// ════════════════════════════════════════════════
//  CROSSWALK WIDTH ESTIMATION
// ════════════════════════════════════════════════
function estimateCrosswalkWidth(src) {
    if (sceneState !== "crosswalk") return;

    const sw = srcW(src), sh = srcH(src);
    const scanH = Math.floor(sh * 0.25);
    const scanY = sh - scanH;

    cwCanvas.width  = sw;
    cwCanvas.height = scanH;
    cwCtx.drawImage(src, 0, scanY, sw, scanH, 0, 0, sw, scanH);

    const d = cwCtx.getImageData(0, 0, sw, scanH).data;
    const scanX = Math.floor(sw / 2);

    let stripeCount = 0;
    let prevWhite = false;
    for (let y = 0; y < scanH; y++) {
        const idx = (y * sw + scanX) * 4;
        const bright = d[idx] * 0.299 + d[idx+1] * 0.587 + d[idx+2] * 0.114;
        const isWhite = bright > 175;
        if (isWhite && !prevWhite) stripeCount++;
        prevWhite = isWhite;
    }

    if (stripeCount >= 2) {
        const est = stripeCount * STRIPE_M;
        estimatedWidth = estimatedWidth
            ? estimatedWidth * 0.75 + est * 0.25
            : est;
    }

    if (debugOn) $('d-width').textContent = estimatedWidth ? estimatedWidth.toFixed(1) + 'm' : '-';
}

// ════════════════════════════════════════════════
//  SENSORS (GPS)
// ════════════════════════════════════════════════
function initSensors() {
    if ('geolocation' in navigator) {
        navigator.geolocation.watchPosition(
            pos => {
                const now = Date.now();
                if (lastGpsCoords && lastGpsMs) {
                    const dt = (now - lastGpsMs) / 1000;
                    if (dt >= 1) {
                        const dist = haversine(lastGpsCoords, pos.coords);
                        const spd  = dist / dt;
                        if (spd > 0.3 && spd < 3.5) {
                            speedHistory.push(spd);
                            if (speedHistory.length > 6) speedHistory.shift();
                            walkSpeed = speedHistory.reduce((a, b) => a + b) / speedHistory.length;
                        }
                    }
                }
                lastGpsCoords = pos.coords;
                lastGpsMs     = now;
                if (debugOn) $('d-speed').textContent = walkSpeed.toFixed(2) + 'm/s (GPS)';
            },
            () => { if (debugOn) $('d-speed').textContent = walkSpeed.toFixed(2) + 'm/s (기본값)'; },
            { enableHighAccuracy: true, maximumAge: 500 }
        );
    }
}

function haversine(c1, c2) {
    const R = 6371000;
    const f1 = c1.latitude  * Math.PI / 180;
    const f2 = c2.latitude  * Math.PI / 180;
    const df = (c2.latitude  - c1.latitude)  * Math.PI / 180;
    const dl = (c2.longitude - c1.longitude) * Math.PI / 180;
    const a  = Math.sin(df/2)**2 + Math.cos(f1) * Math.cos(f2) * Math.sin(dl/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ════════════════════════════════════════════════
//  DECISION ENGINE
// ════════════════════════════════════════════════
function buildDecision() {
    const infoArea = document.getElementById('info-area');
    infoArea.classList.remove('danger', 'warn', 'blinking');

    const crossW    = estimatedWidth || 8;
    const crossT    = crossW / walkSpeed;
    const remaining = ocrTime;

    // 통계 업데이트
    $('s-time').textContent  = remaining !== null ? remaining + '초' : '--';
    $('s-cross').textContent = crossT.toFixed(1) + '초';
    $('s-speed').textContent = walkSpeed.toFixed(1) + 'm/s';
    $('s-width').textContent = crossW.toFixed(0)  + 'm';
    if (debugOn) $('d-crosst').textContent = crossT.toFixed(1) + 's';

    ['sc-time','sc-cross','sc-speed','sc-width'].forEach(id => {
        document.getElementById(id).classList.remove('highlight', 'warn-val', 'danger-val');
    });

    let mainText = "";
    let subText  = "";
    let speakInterval = SPEAK_NORMAL_WAIT;

    // ── 1단계: 장면이 횡단보도가 아니면 ──
    if (sceneState === "background" || sceneState === "low_confidence") {
        mainText = "🔍 분석 중...";
        subText  = "카메라를 신호등 방향으로 향하세요";
        setMsg(mainText, subText);
        return;
    }

    if (sceneState === "surround crosswalk") {
        mainText = "🛤 횡단보도 주변";
        subText  = "횡단보도에 가까이 가세요";
        setMsg(mainText, subText);
        return;
    }

    // ── 2단계: 횡단보도 앞에서 Roboflow 신호 판단 ──
    switch (signalState) {
        case "red":
            mainText = "🔴 정지하세요";
            subText  = "빨간 신호입니다. 신호가 바뀔 때까지 기다리세요.";
            infoArea.classList.add('danger');
            document.getElementById('sc-time').classList.add('danger-val');
            speakInterval = SPEAK_DANGER_WAIT;
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            break;

        case "green":
            if (isBlinking) {
                mainText = "⚠️ 신호가 곧 바뀝니다";
                subText  = remaining
                    ? `${remaining}초 남음 — 시간이 촉박합니다. 다음 신호를 기다리세요.`
                    : "점멸 감지 — 건너지 마세요";
                infoArea.classList.add('warn', 'blinking');
                document.getElementById('sc-time').classList.add('warn-val');
                speakInterval = 4000;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else if (remaining !== null) {
                if (remaining >= crossT + SAFETY_BUFFER) {
                    mainText = "✅ 건너세요";
                    subText  = `${remaining}초 남음 · 예상 횡단 ${crossT.toFixed(0)}초 · 충분히 안전합니다`;
                    document.getElementById('sc-time').classList.add('highlight');
                } else if (remaining >= crossT) {
                    mainText = "⚠️ 서두르세요";
                    subText  = `${remaining}초 남음 · 예상 횡단 ${crossT.toFixed(0)}초 · 빠르게 건너야 합니다`;
                    infoArea.classList.add('warn');
                    document.getElementById('sc-time').classList.add('warn-val');
                    speakInterval = 4000;
                } else {
                    mainText = "🛑 다음 신호를 기다리세요";
                    subText  = `${remaining}초 남음 · 예상 횡단 ${crossT.toFixed(0)}초 · 시간이 부족합니다`;
                    infoArea.classList.add('danger');
                    document.getElementById('sc-time').classList.add('danger-val');
                    speakInterval = SPEAK_DANGER_WAIT;
                }
            } else {
                mainText = "🟢 초록불입니다";
                subText  = "안전하게 건너세요";
                document.getElementById('sc-time').classList.add('highlight');
            }
            break;

        case "off":
            // off 상태가 단독이면 (점멸이 아닌 경우) 신호 전환 중
            mainText = "⏳ 신호 전환 중";
            subText  = "잠시 기다려 주세요";
            break;

        default:
            // Roboflow가 신호등을 못 찾음 → 장면만으로 안내
            if (sceneState === "crosswalk") {
                mainText = "🚶 횡단보도 감지됨";
                subText  = estimatedWidth
                    ? `횡단 거리 약 ${estimatedWidth.toFixed(0)}m · 신호를 확인하세요`
                    : "신호를 확인하세요";
            }
            break;
    }

    if (!mainText) return;

    setMsg(mainText, subText);

    // 음성 안내
    const now = Date.now();
    if (mainText !== lastMsg || now - lastSpeakMs > speakInterval) {
        const clean = mainText.replace(/[🔴🟢✅⚠️🛑🚶🛤🔍⏳]/gu, '').trim();
        speak(clean + ". " + subText);
        lastMsg     = mainText;
        lastSpeakMs = now;
    }
}

// ════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════
function setMsg(main, sub = "") {
    document.getElementById('main-msg').textContent = main;
    document.getElementById('sub-msg').textContent  = sub;
}

function bar(pct) {
    document.getElementById('loading-bar').style.width = pct + '%';
}

let lastSpeakText = "";
function speak(text) {
    if (!window.speechSynthesis || !text.trim()) return;
    lastSpeakText = text;
    if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 1.1;
    u.pitch = 1.0;
    window.speechSynthesis.speak(u);
}

function repeatSpeak() {
    if (lastSpeakText) speak(lastSpeakText);
}

function toggleDebug() {
    debugOn = !debugOn;
    document.getElementById('debug-panel').style.display = debugOn ? 'block' : 'none';
    document.getElementById('btn-debug').classList.toggle('active', debugOn);
}

function toggleROI() {
    roiOn = !roiOn;
    document.getElementById('roi-overlay').style.display = roiOn ? 'block' : 'none';
    document.getElementById('btn-roi').classList.toggle('active', roiOn);
}

function setDefaultROI(sw, sh) {
    roiRect = { x: 0.25, y: 0.04, w: 0.50, h: 0.38 };
    updateROI();
}

function updateROI() {
    if (!roiRect) return;
    const area = document.getElementById('camera-area');
    const dw = area.offsetWidth, dh = area.offsetHeight;
    const roi = document.getElementById('roi-overlay');
    roi.style.left   = (roiRect.x * dw) + 'px';
    roi.style.top    = (roiRect.y * dh) + 'px';
    roi.style.width  = (roiRect.w * dw) + 'px';
    roi.style.height = (roiRect.h * dh) + 'px';
}

window.addEventListener('resize', () => { updateROI(); });

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function srcW(src) { return src instanceof HTMLVideoElement ? src.videoWidth  : src.width;  }
function srcH(src) { return src instanceof HTMLVideoElement ? src.videoHeight : src.height; }
function $(id)     { return document.getElementById(id); }
</script>
